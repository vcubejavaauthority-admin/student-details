<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:replace="~{fragments/head :: head_fragment('Mark Attendance - Vcube Admin')}"></th:block>
</head>
<body class="bg-body">
	<!-- Loading Overlay (kept inline as it's specific to form submissions) -->
	<style>
		.loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--glass-bg); backdrop-filter: blur(5px); z-index: 9999; display: none; align-items: center; justify-content: center; }
		.loading-overlay.show { display: flex !important; }
	</style>

	<div id="loader" class="loading-overlay">
		<div class="vcube-image-loader">
			<img th:src="@{/images/vcube-round-logo.png}" alt="Loading...">
		</div>
	</div>

	<div class="wrapper">
		<!-- Sidebar Fragment -->
		<th:block th:replace="~{fragments/sidebar :: sidebar_fragment}"></th:block>
		
		<!-- Main Content Area -->
		<div id="content">
			<!-- Header Fragment -->
			<th:block th:replace="~{fragments/header :: header_fragment('Mark Attendance')}"></th:block>

			<div class="container-fluid p-4 page-enter">
				<div class="row pt-2 pl-2 mb-4">
                    <div class="col-12">
                         <a th:href="@{/dashboard}" class="btn btn-outline-secondary rounded-pill fw-medium btn-sm">
                            <i class="lucide-arrow-left me-2"></i>Back to Dashboard
                        </a>
                    </div>
                </div>

				<div class="row justify-content-center">
					<div class="col-lg-10 col-xl-8">
						<div class="card glass-card border-0 mb-5 overflow-hidden">
							
							<!-- Custom gradient header specific to this card -->
							<div class="card-header border-0 py-4 text-center" style="background: linear-gradient(135deg, rgba(32, 201, 151, 0.2), rgba(25, 135, 84, 0.1));">
								<div class="p-3 bg-success bg-opacity-25 rounded-circle d-inline-block mb-3">
									<i class="lucide-calendar-check text-success fa-3x"></i>
								</div>
								<h3 class="mb-0 fw-bold text-success">Daily Attendance</h3>
								<p class="text-muted mb-0 mt-2">Enter student roll numbers manually or scan.</p>
							</div>

							<div class="card-body p-4 p-md-5">
								<!-- Main Form -->
								<form th:action="@{/attendance/submit}" id="aemcForm" method="post" onsubmit="return handleSubmit(event)">
									
									<div class="row g-4 mb-4">
										<!-- Batch Selection -->
										<div class="col-md-6">
											<label class="form-label fw-bold text-muted small text-uppercase" style="letter-spacing:1px;">
												<i class="lucide-users me-2 text-primary"></i>Target Batch
											</label> 
											<select class="form-select form-select-lg shadow-sm" name="batch" required>
												<option value="" disabled selected>Select Batch...</option>
												<option th:each="batch : ${batches}" th:value="${batch}" th:text="${batch}"></option>
											</select>
										</div>

										<!-- Date Selection -->
										<div class="col-md-6">
											<label class="form-label fw-bold text-muted small text-uppercase" style="letter-spacing:1px;">
												<i class="lucide-calendar me-2 text-primary"></i>Date
											</label> 
											<input type="date" class="form-control form-control-lg shadow-sm" name="date" id="dateInput">
											<div class="form-text mt-2"><i class="lucide-info me-1" style="width:14px;"></i>Defaults to Today</div>
										</div>
									</div>

									<!-- Roll Numbers Input -->
									<div class="mb-5">
										<label class="form-label fw-bold text-muted small text-uppercase d-flex justify-content-between align-items-center" style="letter-spacing:1px;">
											<span><i class="lucide-hash me-2 text-primary"></i>Present Roll Numbers</span>
											<button class="btn btn-sm btn-outline-danger border-0 rounded-pill" type="button" onclick="clearForm()">
												<i class="lucide-trash-2 me-1" style="width:14px;"></i>Clear
											</button>
										</label>
										<div class="input-group input-group-lg shadow-sm">
											<span class="input-group-text bg-transparent border-end-0 border-primary" style="color:var(--text-main);">
												<i class="lucide-clipboard-list text-primary"></i>
											</span> 
											<input type="text" class="form-control border-start-0 border-primary bg-transparent" style="color:var(--text-main);"
												name="rollNoSet" id="rollInput" placeholder="e.g. 59, 33, 12, 45" required />
										</div>
										<div class="form-text mt-2">Enter roll numbers separated by commas (,)</div>
									</div>

									<!-- Validation Errors Container -->
									<div id="errorAlert" class="alert alert-danger d-none mb-4 shadow-sm border-0 border-start border-4 border-danger"></div>

									<!-- Submit Button -->
									<button type="submit" id="submitBtn" class="btn btn-primary w-100 py-3 fs-5 fw-bold shadow-sm rounded-pill" disabled>
										<i class="lucide-check-circle me-2"></i>Mark Attendance
									</button>
								</form>
							</div>
						</div>

						<!-- Results Section -->
						<div th:if="${emails != null or invalidRollNos != null or attendanceCount != null}" class="mb-5 animation-slide-up">
							
							<div class="row mb-4" th:if="${attendanceCount != null}">
								<div class="col-12 text-center">
									<div class="alert alert-success d-inline-flex align-items-center rounded-pill py-2 px-4 shadow-sm">
										<i class="lucide-check-circle-2 text-success me-2 fa-lg"></i>
										<strong><span th:text="${attendanceCount}">0</span> students logged successfully!</strong>
									</div>
								</div>
							</div>

							<!-- Online Emails -->
							<div class="card glass-card border-0 shadow-sm mb-4" th:if="${onlineEmails != null and !#lists.isEmpty(onlineEmails)}">
								<div class="card-header bg-transparent border-bottom-0 p-4 pb-2 d-flex justify-content-between align-items-center">
									<h6 class="fw-bold text-success mb-0 d-flex align-items-center">
										<div class="p-2 bg-success bg-opacity-25 rounded-circle me-3"><i class="lucide-mail text-success"></i></div>
										Online Students (<span th:text="${#lists.size(onlineEmails)}">0</span>)
									</h6>
									<button class="btn btn-sm btn-outline-success rounded-pill fw-bold" id="copyAllOnline" th:if="${onlineEmails != null and !#lists.isEmpty(onlineEmails)}">
										<i class="lucide-clipboard-copy me-1"></i>Copy All
									</button>
								</div>
								<div class="card-body p-4 pt-0">
									<div class="table-responsive rounded-3 border">
										<table class="table table-hover align-middle mb-0">
											<tbody class="border-top-0">
												<tr th:each="email : ${onlineEmails}">
													<td class="font-monospace text-muted py-3 px-4" th:text="${email}"></td>
													<td class="text-end px-4" style="width:50px;">
														<button class="btn btn-sm btn-light copy-btn" th:id="${'copyOnline-' + email}" th:data-clipboard-text="${email}" title="Copy Email">
															<i class="lucide-copy" style="width:16px;"></i>
														</button>
													</td>
												</tr>
											</tbody>
										</table>
									</div>
								</div>
							</div>

							<!-- Offline/Regular Emails -->
							<div class="card glass-card border-0 shadow-sm mb-4" th:if="${emails != null and !#lists.isEmpty(emails)}">
								<div class="card-header bg-transparent border-bottom-0 p-4 pb-2 d-flex justify-content-between align-items-center">
									<h6 class="fw-bold text-secondary mb-0 d-flex align-items-center">
										<div class="p-2 bg-secondary bg-opacity-25 rounded-circle me-3"><i class="lucide-mail text-secondary"></i></div>
										Offline Students (<span th:text="${#lists.size(emails)}">0</span>)
									</h6>
									<button class="btn btn-sm btn-outline-secondary rounded-pill fw-bold" id="copyAllOffline" th:if="${emails != null and !#lists.isEmpty(emails)}">
										<i class="lucide-clipboard-copy me-1"></i>Copy All
									</button>
								</div>
								<div class="card-body p-4 pt-0">
									<div class="table-responsive rounded-3 border">
										<table class="table table-hover align-middle mb-0">
											<tbody class="border-top-0">
												<tr th:each="email : ${emails}">
													<td class="font-monospace text-muted py-3 px-4" th:text="${email}"></td>
													<td class="text-end px-4" style="width:50px;">
														<button class="btn btn-sm btn-light copy-btn" th:id="${'copyOffline-' + email}" th:data-clipboard-text="${email}" title="Copy Email">
															<i class="lucide-copy" style="width:16px;"></i>
														</button>
													</td>
												</tr>
											</tbody>
										</table>
									</div>
								</div>
							</div>

							<!-- Invalid Rolls Table -->
							<div class="card glass-card border-0 border-danger border-start border-4 shadow-sm mb-4" th:if="${invalidRollNos != null and !#lists.isEmpty(invalidRollNos)}">
								<div class="card-header bg-transparent border-bottom-0 p-4 pb-2">
									<h6 class="fw-bold text-danger mb-0 d-flex align-items-center">
										<div class="p-2 bg-danger bg-opacity-25 rounded-circle me-3"><i class="lucide-alert-triangle text-danger"></i></div>
										Invalid Rolls Skipped (<span th:text="${#lists.size(invalidRollNos)}">0</span>)
									</h6>
								</div>
								<div class="card-body p-4 pt-0">
									<div class="d-flex flex-wrap gap-2">
										<span th:each="roll : ${invalidRollNos}" class="badge bg-danger bg-opacity-10 text-danger border border-danger p-2 px-3 fw-bold shadow-sm">
											<i class="lucide-hash me-1" style="width:14px;"></i><span th:text="${roll}"></span>
										</span>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Global Scripts Fragment -->
	<th:block th:replace="~{fragments/scripts :: scripts_fragment}"></th:block>

	<!-- Page Code -->
	<script>
		// Copy functionality
		document.querySelectorAll('.copy-btn').forEach(btn => {
			btn.addEventListener('click', function() {
				const text = this.getAttribute('data-clipboard-text');
				copyToClipboard(text, this);
			});
		});

		function copyToClipboard(text, btn) {
			navigator.clipboard.writeText(text).then(() => {
				const icon = btn.querySelector('i');
				const originalClass = Array.from(icon.classList).find(c => c.startsWith('lucide-'));
				const isCopyAll = btn.id && btn.id.startsWith('copyAll');
				
				icon.classList.remove(originalClass);
				icon.classList.add('lucide-check', 'text-success');
				const originalText = isCopyAll ? btn.innerHTML : null;
				if(isCopyAll) btn.innerHTML = '<i class="lucide-check text-success me-1"></i>Copied!';
				
				if(typeof lucide !== 'undefined') lucide.createIcons();
				
				setTimeout(() => {
					icon.classList.remove('lucide-check', 'text-success');
					icon.classList.add(originalClass);
					if(isCopyAll) btn.innerHTML = originalText;
					if(typeof lucide !== 'undefined') lucide.createIcons();
				}, 2000);
			});
		}

		// Copy All functionality
		const copyAllOnline = document.getElementById('copyAllOnline');
		if(copyAllOnline) {
			copyAllOnline.addEventListener('click', function() {
				const emails = Array.from(document.getElementById('copyAllOnline').closest('.card').querySelectorAll('td.font-monospace'))
									.map(td => td.innerText.trim())
									.join('\n');
				copyToClipboard(emails, this);
			});
		}
		
		const copyAllOffline = document.getElementById('copyAllOffline');
		if(copyAllOffline) {
			copyAllOffline.addEventListener('click', function() {
				const emails = Array.from(document.getElementById('copyAllOffline').closest('.card').querySelectorAll('td.font-monospace'))
									.map(td => td.innerText.trim())
									.join('\n');
				copyToClipboard(emails, this);
			});
		}

		// Date Helper
		function getTodayStr() {
			const d = new Date();
			const m = String(d.getMonth() + 1).padStart(2, '0');
			const day = String(d.getDate()).padStart(2, '0');
			return d.getFullYear() + '-' + m + '-' + day;
		}

		// Validation
		document.addEventListener('DOMContentLoaded', function() {
			const form = document.getElementById('aemcForm');
			const batchSelect = form.querySelector('select[name="batch"]');
			const dateInput = document.getElementById('dateInput');
			const rollInput = document.getElementById('rollInput');
			const submitBtn = document.getElementById('submitBtn');

			function validateForm() {
				const batchOk = batchSelect.value.trim() !== '';
				const rollsOk = rollInput.value.trim() !== '';

				let errors = [];
				if(batchSelect.value.trim() !== '') {
					// wait to show batch error until user types rolls
				} else if(rollsOk) {
					errors.push("Please select a target batch.");
				}

				let dateOk = true;
				if (dateInput.value && dateInput.value > getTodayStr()) {
					dateOk = false;
					dateInput.classList.add('is-invalid');
					errors.push("Future dates are not allowed. Please select today or a previous date.");
				} else {
					dateInput.classList.remove('is-invalid');
				}

				let rollValid = false;
				if (rollInput.value.trim() === '') {
					// empty is fine initially, button just disabled
				} else if (!/^[A-Za-z0-9,\-\s]+$/.test(rollInput.value)) {
					rollInput.classList.add('is-invalid');
					errors.push("Invalid layout: Only alphanumeric roll numbers, hyphens, and commas are allowed.");
				} else {
					rollValid = true;
					rollInput.classList.remove('is-invalid');
				}

				const errorAlert = document.getElementById('errorAlert');
				if(errors.length > 0 && (rollsOk || batchOk || dateInput.value > getTodayStr())) {
					errorAlert.innerHTML = '<strong><i class="lucide-alert-triangle me-1" style="width:16px;"></i>Please fix the following:</strong><ul class="mb-0 mt-1 small"><li>' + errors.join('</li><li>') + '</li></ul>';
					errorAlert.classList.remove('d-none');
					if(typeof lucide !== 'undefined') lucide.createIcons();
				} else {
					errorAlert.classList.add('d-none');
				}

				submitBtn.disabled = !(batchOk && rollValid && dateOk);
			}

			batchSelect.addEventListener('change', validateForm);
			rollInput.addEventListener('input', validateForm);
			dateInput.addEventListener('change', validateForm);
			dateInput.valueAsDate = new Date(); // Default to today
            validateForm(); // Initial Validation
		});

		function handleSubmit(event) {
			const dateInput = document.getElementById('dateInput');
			if (dateInput.value && dateInput.value > getTodayStr()) {
				event.preventDefault();
				dateInput.classList.add('is-invalid');
				return false;
			}
			document.getElementById('loader').classList.add('show');
			const submitBtn = document.getElementById('submitBtn');
			submitBtn.innerHTML = '<i class="lucide-loader-2 lucide-spin me-2"></i>Processing...';
			submitBtn.disabled = true;
			if(typeof lucide !== 'undefined') lucide.createIcons();
			return true;
		}

		function clearForm() {
			document.getElementById('aemcForm').reset();
			document.getElementById('dateInput').valueAsDate = new Date();
            document.getElementById('submitBtn').disabled = true;
		}
	</script>
</body>
</html>
