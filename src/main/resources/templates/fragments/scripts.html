<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Scripts Fragment -->
    <div th:fragment="scripts_fragment">
        <!-- Toast Notification Container -->
        <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
            <div id="globalToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="d-flex">
                    <div class="toast-body d-flex align-items-center">
                        <i id="toastIcon" class="me-2 fa-lg"></i>
                        <span id="toastMessage">Message</span>
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            </div>
        </div>

        <!-- Hidden input for thymeleaf messages to be read by JS -->
        <input type="hidden" id="sysSuccessMsg" th:value="${success} ?: (${message} and ${success != false} ? ${message} : '')" />
        <input type="hidden" id="sysErrorMsg" th:value="${error} ?: (${success == false} ? ${message} : '')" />

        <!-- Bootstrap JS Bundle -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        
        <!-- Shared Theme Manager -->
        <script th:src="@{/js/theme.js}"></script>

        <!-- Global Logic Script -->
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                // Initialize Lucide Icons
                if(typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
                
                // Sidebar Toggle
                const sidebar = document.getElementById('sidebar');
                const sidebarToggle = document.getElementById('sidebarToggle');
                const mobileSidebarToggle = document.getElementById('mobileSidebarToggle');
                
                const toggleSidebar = () => {
                    if (sidebar) sidebar.classList.toggle('collapsed');
                    if (sidebar && window.innerWidth < 992) {
                        sidebar.classList.toggle('active');
                    }
                };
                
                if (sidebarToggle) sidebarToggle.addEventListener('click', toggleSidebar);
                if (mobileSidebarToggle) mobileSidebarToggle.addEventListener('click', toggleSidebar);
                
                // === GLOBAL TOAST MANAGER ===
                const showToast = (message, type) => {
                    const toastEl = document.getElementById('globalToast');
                    const toastMessage = document.getElementById('toastMessage');
                    const toastIcon = document.getElementById('toastIcon');
                    
                    if (!toastEl) return;
                    
                    toastMessage.textContent = message;
                    toastEl.classList.remove('bg-success', 'bg-danger', 'bg-warning');
                    
                    if (type === 'success') {
                        toastEl.classList.add('bg-success');
                        toastIcon.className = 'fas fa-check-circle me-2 fa-lg';
                    } else if (type === 'error') {
                        toastEl.classList.add('bg-danger');
                        toastIcon.className = 'fas fa-exclamation-circle me-2 fa-lg';
                    } else {
                        toastEl.classList.add('bg-warning', 'text-dark');
                        toastIcon.className = 'fas fa-info-circle me-2 fa-lg';
                        toastEl.classList.remove('text-white');
                    }
                    
                    const toast = new bootstrap.Toast(toastEl, { delay: 4000 });
                    toast.show();
                };
                
                // Check for injected messages and show toast
                const successMsg = document.getElementById('sysSuccessMsg')?.value;
                const errorMsg = document.getElementById('sysErrorMsg')?.value;
                
                if (successMsg) showToast(successMsg, 'success');
                else if (errorMsg) showToast(errorMsg, 'error');
                
                // === GLOBAL DATE INPUT MAX TO TODAY ===
                document.querySelectorAll('input[type="date"]').forEach(input => {
                    const d = new Date();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    const today = d.getFullYear() + '-' + m + '-' + day;
                    input.setAttribute('max', today);
                    if (!input.value) {
                        input.value = today;
                    }
                });

                // === GLOBAL ROLL NUMBERS REGEX VALIDATION ===
                const rollInputs = document.querySelectorAll('input[name="rollNoSet"], textarea[name="rollNoSet"], input[id*="roll"], textarea[id*="roll"]');
                rollInputs.forEach(input => {
                    input.addEventListener('input', function() {
                        this.value = this.value.replace(/[^0-9\-=\s,]/g, '');
                    });
                });

                // Page Enter Animation setup
                document.body.classList.add('page-enter');
            });
        </script>

        <!-- Vcube Assistant Widget -->
        <script th:src="@{/vcube-assistant.js}"></script>
    </div>
</body>
</html>
