<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Sticky Header Fragment -->
    <div th:fragment="header_fragment(pageTitle)" class="top-header">
        <div class="d-flex align-items-center">
            <button class="btn btn-link text-decoration-none p-0 me-3 d-lg-none" id="sidebarToggle" style="color: var(--text-main);">
                <i class="fas fa-bars fa-lg"></i>
            </button>
            <h4 class="mb-0 fw-bold" th:text="${pageTitle} ?: 'Dashboard'">Dashboard</h4>
        </div>
        
        <div class="d-flex align-items-center gap-2">
            <!-- User Info: first name for users, full name for admin -->
            <span class="d-none d-md-inline text-muted small fw-medium me-2" th:if="${session.userRole == 'admin'}" th:text="'👤 ' + ${session.displayName}"></span>
            <span class="d-none d-md-inline text-muted small fw-medium me-2" th:if="${session.userRole != 'admin' and session.firstName != null}" th:text="'👤 ' + ${session.firstName}"></span>
            
            <!-- Admin Panel Link -->
            <a th:if="${session.userRole == 'admin'}" th:href="@{/admin/users}" class="btn btn-sm btn-outline-primary me-1" title="Manage Users" style="border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;">
                <i class="lucide-users" style="width: 16px; height: 16px;"></i>
            </a>

            <!-- Global Dark/Light Switch -->
            <button class="theme-switch" id="themeSwitch" title="Toggle Dark/Light Mode">
                <i class="lucide-moon" id="themeIcon"></i>
            </button>

            <!-- Logout Button -->
            <a th:href="@{/auth/logout}" class="btn btn-sm btn-outline-danger ms-1 d-flex align-items-center gap-1" title="Logout" style="border-radius: 0.5rem; padding: 0.35rem 0.75rem;">
                <i class="lucide-log-out" style="width: 16px; height: 16px;"></i>
                <span class="d-none d-md-inline fw-medium" style="font-size: 0.8rem;">Logout</span>
            </a>
        </div>
    </div>
</body>
</html>
