<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Students – Google Sheet</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
	<link
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
	rel="stylesheet">
<link href="../styles.css" rel="stylesheet">

</head>
<body class="bg-light">
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand fw-bold" th:href="@{/}"> <i
				class="fas fa-arrow-left me-2"></i>Back to Dashboard
			</a>
		</div>
	</nav>
	<div class="container mt-4">

		<div class="card shadow position-relative" id="mainCard">
			<!-- loading layer -->
			<div id="loader" class="loading-overlay">
				<div class="spinner-border text-primary" role="status">
					<span class="visually-hidden">Loading...</span>
				</div>
			</div>

			<div class="card-header bg-warning text-white">
				<h4 class="mb-0">Students – Google Sheet</h4>
			</div>
			<div class="card-body">
				<!-- Search + Batch + Rolls filter form (server-side) -->
				<form class="row g-3 mb-3"
					th:action="@{/attendance/filter-students}" method="get"
					onsubmit="showLoading()">
					<!-- Batch dropdown -->
					<div class="col-md-3">
						<label class="form-label fw-bold">Batch</label> <select
							class="form-select" name="batch">
							<option value="">All</option>
							<option th:each="b : ${batches}" th:value="${b}" th:text="${b}"
								th:selected="${b == selectedBatch}"></option>
						</select>
					</div>

					<!-- Keyword search -->
					<div class="col-md-3">
						<label class="form-label fw-bold">Search</label> <input
							type="text" class="form-control" name="keyword"
							th:value="${keyword}"
							placeholder="Search by roll, name, email, mobile">
					</div>

					<!-- Roll numbers quick select (backend) -->
					<div class="col-md-4">
						<label class="form-label fw-bold">Roll Numbers (comma
							separated)</label> <input type="text" class="form-control"
							name="rollInput" th:value="${rollInput}"
							placeholder="Examples: JFS-B59-001,JFS-B59-007 or 1,7,10">
						<div class="form-text">Click “Apply Rolls” to auto-mark
							these students.</div>
					</div>

					<div class="col-md-2 d-flex align-items-end">
						<button type="submit" class="btn btn-secondary w-100"
							name="action" value="applyRolls">Apply Rolls</button>
					</div>

					<div class="col-12 d-flex justify-content-end">
						<button type="submit" class="btn btn-primary" name="action"
							value="search">Search</button>
					</div>
				</form>

				<!-- Students table + attendance form -->
				<form th:action="@{/attendance/submit-attendance}" method="post"
					onsubmit="showLoading()">
					<div class="table-responsive">
						<table id="studentsTable"
							class="table table-striped table-bordered table-sm align-middle">
							<thead class="table-dark">
								<tr>
									<th>s/no</th>
									<th>Roll No</th>
									<th>Name</th>
									<th>Mobile</th>
									<th>Email</th>
									<th>Attendance</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="s, stat : ${students}">
									<td th:text="${stat.index + 1}"></td>
									<td th:text="${s.rollNo}"></td>
									<td th:text="${s.name}"></td>
									<td th:text="${s.mobile}"></td>
									<td th:text="${s.email}"></td>
									<td class="text-center"><input type="checkbox"
										name="presentRolls" th:value="${s.rollNo}"
										th:checked="${s.online} ? 'checked' : null"></td>
								</tr>
							</tbody>
						</table>
					</div>

					<!-- Hidden filters to keep context -->
					<input type="hidden" name="batch" th:value="${selectedBatch}">
					<input type="hidden" name="date" th:value="${selectedDate}">

					<div class="mt-3 d-flex justify-content-end">
						<button type="submit" class="btn btn-success">✅ Save
							Attendance</button>
					</div>
				</form>

			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="../appScript.js"></script>
</body>
</html>
