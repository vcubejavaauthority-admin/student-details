<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: head_fragment('Student GUT-Exam Details – Vcube Admin')}"></th:block>
</head>
<body class="bg-body">
    <style>
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--glass-bg); backdrop-filter: blur(5px); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .loading-overlay.show { display: flex !important; }
    </style>
    <div id="loader" class="loading-overlay">
        <div class="vcube-image-loader">
			<img th:src="@{/images/vcube-round-logo.png}" alt="Loading...">
		</div>
    </div>

    <div class="wrapper">
        <th:block th:replace="~{fragments/sidebar :: sidebar_fragment}"></th:block>
        <div id="content">
            <th:block th:replace="~{fragments/header :: header_fragment('Student GUT-Exam Analytics')}"></th:block>

            <div class="container-fluid p-4 page-enter">
                <div class="row pt-2 pl-2 mb-3">
                    <div class="col-12">
                         <a th:href="@{/dashboard}" class="btn btn-outline-secondary rounded-pill fw-medium btn-sm">
                            <i class="lucide-arrow-left me-2"></i>Back to Dashboard
                        </a>
                    </div>
                </div>

                <div class="card glass-card border-0 shadow-sm mb-4">
                    <div class="card-header border-0 py-4 d-flex align-items-center" style="background: linear-gradient(135deg, rgba(220, 53, 69, 0.1), rgba(186, 40, 54, 0.05));">
                        <div class="p-2 bg-danger bg-opacity-10 rounded-circle me-3">
                            <i class="lucide-file-text text-danger fa-2x d-block" style="line-height:1;"></i>
                        </div>
                        <div>
                            <h4 class="mb-0 fw-bold text-danger">GUT-Exam Details</h4>
                            <p class="mb-0 text-muted small">Select a batch to analyze student GUT-exam performance.</p>
                        </div>
                    </div>
                    
                    <div class="card-body p-4">
                        <form th:action="@{/students-gut-exams}" method="post" onsubmit="showLoading()" class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-muted text-uppercase">Analyze Batch</label>
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-transparent border-end-0 border-danger"><i class="lucide-users text-danger"></i></span>
                                    <select class="form-select border-start-0 border-danger bg-transparent text-body" name="batchNo" required>
                                        <option value="" selected disabled>Select batch to load...</option>
                                        <option th:each="batch : ${batches}" th:value="${batch}" th:text="${batch}"></option>
                                    </select>
                                    <button type="submit" class="btn btn-danger fw-bold px-4 border border-danger">
                                        <i class="lucide-search me-2" style="width:16px;"></i>Load
                                    </button>
                                </div>
                            </div>
                        </form>

                        <div th:if="${studentsGUTExams != null and !studentsGUTExams.isEmpty()}" class="mb-4 d-flex align-items-center p-3 bg-danger bg-opacity-10 rounded-3 border border-danger shadow-sm" style="max-width:max-content;">
                            <i class="lucide-file-text text-danger me-3 fa-2x"></i>
                            <div>
                                <h6 class="text-uppercase fw-bold text-muted mb-0 small" style="letter-spacing:1px;">Total GUT Exams Configured</h6>
                                <h3 class="mb-0 fw-bold text-danger" th:text="${studentsGUTExams[0].totalGUTExams}">0</h3>
                            </div>
                        </div>

                        <div class="table-responsive bg-transparent border rounded-3 shadow-sm mb-4">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light text-muted" style="border-bottom: 2px solid var(--border-color);">
                                    <tr>
                                        <th class="ps-4 py-3" style="width:50px;">#</th>
                                        <th class="py-3">Roll No</th>
                                        <th class="py-3">Name</th>
                                        <th class="py-3 text-center">Exams Attended</th>
                                        <th class="py-3 text-center">Total Exams</th>
                                        <th class="py-3 text-center">Marks Obtained</th>
                                        <th class="py-3 text-center">Total Marks</th>
                                        <th class="pe-4 py-3 text-end" style="width: 120px;">Performance</th>
                                    </tr>
                                </thead>
                                <tbody class="border-top-0">
                                    <tr th:if="${studentsGUTExams == null or studentsGUTExams.isEmpty()}">
                                        <td colspan="8" class="text-center py-5 text-muted">
                                            <i class="lucide-bar-chart-2 fa-3x mb-3 opacity-50 d-block mx-auto"></i>
                                            <h5>Awaiting Batch Selection</h5>
                                            <p class="small">Please select a batch above and click Load to see analytics.</p>
                                        </td>
                                    </tr>
                                    <tr th:each="m, stat : ${studentsGUTExams}">
                                        <td class="ps-4 text-muted fw-bold" th:text="${stat.index + 1}"></td>
                                        <td><span class="badge bg-danger bg-opacity-10 text-danger border border-danger fw-bold px-2 py-1"><i class="lucide-hash me-1" style="width:12px;"></i><span th:text="${m.student.rollNo}"></span></span></td>
                                        <td class="fw-medium text-body" th:text="${m.student.name}"></td>
                                        <td class="text-center fw-bold" th:text="${m.StudentTotalGUTExams}"></td>
                                        <td class="text-center fw-bold text-muted" th:text="${studentsGUTExams[0].totalGUTExams}"></td>
                                        <td class="text-center fw-bold text-success" th:text="${m.StudentTotalGUTExamsMarks}"></td>
                                        <td class="text-center fw-bold text-muted" th:text="${studentsGUTExams[0].totalGUTExamsMarks}"></td>
                                        <td class="pe-4 text-end">
                                            <span class="badge w-100 fs-6 shadow-sm" th:classappend="${m.StudentPercentage >= 75 ? 'bg-success' : (m.StudentPercentage >= 50 ? 'bg-warning text-dark' : 'bg-danger')}" th:text="${m.StudentPercentage}+ '%'">0%</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="~{fragments/scripts :: scripts_fragment}"></th:block>
    <script>function showLoading() { document.getElementById('loader').classList.add('show'); }</script>
</body>
</html>
