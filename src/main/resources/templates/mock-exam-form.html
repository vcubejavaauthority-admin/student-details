<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mock-Exam Entry – Google Sheet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
	rel="stylesheet">
        <link href="../styles.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand fw-bold" th:href="@{/}"> <i
				class="fas fa-arrow-left me-2"></i>Back to Dashboard
			</a>
		</div>
	</nav>
<div class="container mt-5">
 <!-- loading layer -->
    <div id="loader" class="loading-overlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow">
                <div class="card-header bg-warning text-white text-center">
                    <h3>📝 Mock-Exam Marks Entry</h3>
                </div>
                <div class="card-body">

                    <!-- Success / Error message -->
                    <div th:if="${success != null}"
                         class="alert alert-dismissible fade show"
                         th:classappend="${success} ? ' alert-success' : ' alert-danger'">
                        <strong th:text="${success} ? 'Success!' : 'Error!'"></strong>
                        <span th:text="${message}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/mock-exam/submit}" method="post" onsubmit="showLoading()">
                        <!-- Batch -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Batch</label>
                            <select class="form-select" name="batch" required>
                                <option value="">Select batch...</option>
                                <option th:each="b : ${batches}"
                                        th:value="${b}"
                                        th:text="${b}">
                                </option>
                            </select>
                        </div>

                        <!-- Date -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mock-Exam Date</label>
                            <input type="date" class="form-control" name="date" required>
                        </div>

                        <!-- RollNo + Marks input -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Roll Numbers with Marks</label>
                            <textarea class="form-control"
                                      name="rollNoSet"
                                      rows="3"
                                      placeholder="Example: 1=3, 2=4.5, 10=5"
                                      required></textarea>
                            <div class="form-text">
                                Format: <code>RollNo-Marks</code> comma separated.  
                                Example: <code>1=3,2=4.5,10=5</code>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex justify-content-between">
                            <button type="button"
                                    class="btn btn-outline-secondary"
                                    onclick="clearForm()">
                                Clear
                            </button>
                            <button type="submit" class="btn btn-success">
                                ✅ Save Mock-Exam Marks
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../appScript.js"></script>
</body>
</html>
