<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<th:block
	th:replace="~{fragments/head :: head_fragment('Mock Drive Feedback – Vcube Admin')}"></th:block>
<style>
.section-title {
	font-size: 0.85rem;
	font-weight: 700;
	color: var(--text-muted);
	text-transform: uppercase;
	letter-spacing: 1px;
	margin-bottom: 1.5rem;
	border-bottom: 1px solid rgba(255, 193, 7, 0.2);
	padding-bottom: 0.5rem;
	display: flex;
	align-items: center;
}

.section-title i {
	margin-right: 0.5rem;
	color: #ffc107;
}

.glass-input {
	background: rgba(255, 255, 255, 0.05) !important;
	border: 1px solid rgba(255, 193, 7, 0.3) !important;
	color: var(--text-main) !important;
	transition: all 0.3s ease;
}

.glass-input:focus {
	background: rgba(255, 255, 255, 0.1) !important;
	border-color: #ffc107 !important;
	box-shadow: 0 0 10px rgba(255, 193, 7, 0.2) !important;
}

.feedback-card {
	transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.feedback-card:hover {
	transform: translateY(-5px);
	box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
}
/* Loader styles */
.loading-overlay {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	background: var(--glass-bg);
	backdrop-filter: blur(5px);
	z-index: 9999;
	display: none;
	align-items: center;
	justify-content: center;
}

.loading-overlay.show {
	display: flex !important;
}
</style>
</head>
<body class="bg-body">
	<!-- loading layer -->
	<div id="loader" class="loading-overlay">
		<div class="vcube-image-loader">
			<img th:src="@{/images/vcube-round-logo.png}" alt="Loading...">
		</div>
	</div>

	<div class="wrapper">
		<th:block th:replace="~{fragments/sidebar :: sidebar_fragment}"></th:block>
		<div id="content">
			<th:block
				th:replace="~{fragments/header :: header_fragment('Mock Drive Feedback')}"></th:block>

			<div class="container-fluid p-4 page-enter">
				<div class="row pt-2 pl-2 mb-4">
					<div class="col-12">
						<a th:href="@{/dashboard}"
							class="btn btn-outline-secondary rounded-pill fw-medium btn-sm">
							<i class="lucide-arrow-left me-2"></i>Back to Dashboard
						</a>
					</div>
				</div>

				<div class="row justify-content-center">
					<div class="col-md-11 col-lg-10 col-xl-9">
						<div
							class="card glass-card border-0 mb-5 overflow-hidden feedback-card">
							<div class="card-header border-0 py-4 text-center"
								style="background: linear-gradient(135deg, rgba(255, 193, 7, 0.2), rgba(253, 126, 20, 0.1));">
								<div
									class="p-3 bg-warning bg-opacity-25 rounded-circle d-inline-block mb-3">
									<i class="lucide-medal text-warning fa-3x"
										style="color: #ffc107;"></i>
								</div>
								<h3 class="mb-0 fw-bold text-warning">Student Mock Drive
									Feedback</h3>
								<p class="text-muted mb-0 mt-2">Enter feedback and scores to
									save to sheet and notify student.</p>
							</div>

							<div class="card-body p-4 p-md-5">
								<!-- Alerts -->
								<div th:if="${success}"
									class="alert alert-success border-0 shadow-sm mb-4">
									<i class="lucide-check-circle me-2"></i> <span
										th:text="${success}"></span>
								</div>
								<div th:if="${warning}"
									class="alert alert-warning border-0 shadow-sm mb-4">
									<i class="lucide-alert-triangle me-2"></i> <span
										th:text="${warning}"></span>
								</div>
								<div th:if="${error}"
									class="alert alert-danger border-0 shadow-sm mb-4">
									<i class="lucide-x-circle me-2"></i> <span th:text="${error}"></span>
								</div>

								<form th:action="@{/mock-drive/submit}" th:object="${mockDrive}"
									method="post" onsubmit="showLoading()">

									<!-- Student Information -->
									<div class="section-title">
										<i class="lucide-user"></i> Student Selection
									</div>
									<div class="row g-4 mb-4">
										<div class="col-md-6">
											<label
												class="form-label fw-bold small text-muted text-uppercase">Select
												Batch</label> <select id="batchSelect"
												class="form-select glass-input">
												<option value="">Select Batch...</option>
												<option th:each="b : ${batches}" th:value="${b}"
													th:text="${b}"></option>
											</select>
										</div>
										<div class="col-md-6">
											<label
												class="form-label fw-bold small text-muted text-uppercase">Select
												Student</label> <select id="studentSelect"
												class="form-select glass-input" disabled>
												<option value="">Select Student...</option>
											</select>
										</div>
									</div>

									<div class="row g-4 mb-5">
										<div class="col-md-4">
											<label
												class="form-label fw-bold small text-muted text-uppercase">Student
												Name</label> <input type="text" th:field="*{studentName}"
												id="studentName" class="form-control glass-input"
												placeholder="Name" required>
										</div>
										<div class="col-md-4">
											<label
												class="form-label fw-bold small text-muted text-uppercase">Batch
												/ Roll No</label> <input type="text" th:field="*{batchNoRollNo}"
												id="batchNoRollNo" class="form-control glass-input"
												placeholder="Roll No" required>
										</div>
										<div class="col-md-4">
											<label
												class="form-label fw-bold small text-muted text-uppercase">Student
												Email</label> <input type="email" th:field="*{emailId}" id="emailId"
												class="form-control glass-input" placeholder="Email"
												required>
										</div>
									</div>

									<!-- Round 1 & 2 -->
									<div class="row g-4 mb-5">
										<div class="col-md-4">
											<div class="section-title">
												<i class="lucide-cpu"></i> Round 1
											</div>
											<label
												class="form-label fw-bold small text-muted text-uppercase">Aptitude</label>
											<input type="text" th:field="*{aptitudeRound1}"
												class="form-control glass-input mb-3"
												placeholder="Score/Remarks"> <label
												class="form-label fw-bold small text-muted text-uppercase">Technical</label>
											<input type="text" th:field="*{technicalRound1}"
												class="form-control glass-input" placeholder="Score/Remarks">
										</div>

										<div class="col-md-4">
											<div class="section-title">
												<i class="lucide-mic"></i> Round 2
											</div>
											<label
												class="form-label fw-bold small text-muted text-uppercase">JAM
												Rating (1-10)</label> <select th:field="*{jamRatingRound2}"
												class="form-select glass-input">
												<option value="">Select Rating...</option>
												<option value="1">1</option>
												<option value="2">2</option>
												<option value="3">3</option>
												<option value="4">4</option>
												<option value="5">5</option>
												<option value="6">6</option>
												<option value="7">7</option>
												<option value="8">8</option>
												<option value="9">9</option>
												<option value="10">10</option>
											</select>
										</div>

										<div class="col-md-4">
											<div class="section-title">
												<i class="lucide-star"></i> Final Verdict
											</div>
											<label
												class="form-label fw-bold small text-muted text-uppercase">Overall
												Rating (1-10)</label> <select th:field="*{overall}"
												class="form-select glass-input" required>
												<option value="">Select Rating...</option>
												<option value="10">10 - Outstanding</option>
												<option value="9">9 - Excellent</option>
												<option value="8">8 - Very Good</option>
												<option value="7">7 - Good</option>
												<option value="6">6 - Above Average</option>
												<option value="5">5 - Average</option>
												<option value="4">4 - Below Average</option>
												<option value="3">3 - Poor</option>
												<option value="2">2 - Very Poor</option>
												<option value="1">1 - Needs Improvement</option>
											</select>
										</div>
									</div>

									<!-- Round 3: Technical Interview -->
									<div class="section-title">
										<i class="lucide-code-2"></i> Round 3: Technical Interview
									</div>
									<div class="row g-4 mb-5">
										<div class="col-md-3">
											<label
												class="form-label fw-bold small text-muted text-uppercase">Score
												(0-10)</label> <input type="number" step="0.5" min="0" max="10"
												th:field="*{technicalInterviewScoreRound3}"
												class="form-control glass-input" placeholder="0-10">
										</div>
										<div class="col-md-9">
											<label
												class="form-label fw-bold small text-muted text-uppercase">Technical
												Feedback</label>
											<textarea th:field="*{technicalInterviewFeedbackRound3}"
												class="form-control glass-input" rows="2"
												placeholder="Specific technical strengths and weaknesses..."></textarea>
										</div>
									</div>

									<!-- Round 4: HR Interview -->
									<div class="section-title">
										<i class="lucide-briefcase"></i> Round 4: HR Interview
									</div>
									<div class="row g-4 mb-5">
										<div class="col-md-3">
											<label
												class="form-label fw-bold small text-muted text-uppercase">Score
												(0-10)</label> <input type="number" step="0.5" min="0" max="10"
												th:field="*{hrInterviewScoreRound4}"
												class="form-control glass-input" placeholder="0-10">
										</div>
										<div class="col-md-9">
											<label
												class="form-label fw-bold small text-muted text-uppercase">HR
												Feedback</label>
											<textarea th:field="*{hrInterviewFeedbackRound4}"
												class="form-control glass-input" rows="2"
												placeholder="Communication skills, confidence, etc..."></textarea>
										</div>
									</div>

									<div class="d-grid mt-4">
										<button type="submit"
											class="btn btn-warning text-dark btn-lg py-3 fw-bold rounded-pill shadow-sm">
											<i class="lucide-send me-2"></i>Submit Feedback & Send Email
										</button>
									</div>
								</form>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<th:block th:replace="~{fragments/scripts :: scripts_fragment}"></th:block>

	<script>
        function showLoading() { 
            document.getElementById('loader').classList.add('show'); 
        }

        document.getElementById('batchSelect').addEventListener('change', function() {
            const batch = this.value;
            const studentSelect = document.getElementById('studentSelect');
            studentSelect.innerHTML = '<option value="">Loading students...</option>';
            studentSelect.disabled = true;

            if (batch) {
                fetch(`/api/mock-drive/students?batch=${batch}`)
                    .then(response => response.json())
                    .then(students => {
                        studentSelect.innerHTML = '<option value="">Select Student...</option>';
                        students.forEach(s => {
                            const option = document.createElement('option');
                            option.value = JSON.stringify(s);
                            // Using Name with capital N as defined in StudentModel
                            option.textContent = `${s.rollNo} - ${s.Name || s.name}`; 
                            studentSelect.appendChild(option);
                        });
                        studentSelect.disabled = false;
                    })
                    .catch(err => {
                        console.error(err);
                        studentSelect.innerHTML = '<option value="">Error loading students</option>';
                    });
            } else {
                studentSelect.innerHTML = '<option value="">Select Student...</option>';
            }
        });

        document.getElementById('studentSelect').addEventListener('change', function() {
            if (this.value) {
                const student = JSON.parse(this.value);
                document.getElementById('studentName').value = student.Name || student.name;
                document.getElementById('batchNoRollNo').value = student.rollNo;
                document.getElementById('emailId').value = student.email;
            } else {
                document.getElementById('studentName').value = '';
                document.getElementById('batchNoRollNo').value = '';
                document.getElementById('emailId').value = '';
            }
        });
    </script>
</body>
</html>
