<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head_fragment('Daily Tasks - Vcube Admin')}">
</head>
<body data-theme="light">
    <div class="wrapper">
        <!-- Sidebar Fragment -->
        <th:block th:replace="~{fragments/sidebar :: sidebar_fragment}"></th:block>
        
        <!-- Main Content Area -->
        <div id="content">
            <!-- Header Fragment -->
            <th:block th:replace="~{fragments/header :: header_fragment('Daily Tasks & Interview Questions')}"></th:block>
            
            <!-- Page Content -->
            <div class="container-fluid p-4 page-enter">
                <div class="row g-4">
                    
                    <!-- Subjects Sidebar (Left) -->
                    <div class="col-lg-3">
                        <div class="card glass-card border-0 h-100 shadow-sm overflow-hidden">
                            <div class="card-header bg-primary bg-opacity-10 border-0 p-3">
                                <h6 class="mb-0 fw-bold text-primary d-flex align-items-center">
                                    <i data-lucide="book-open" class="me-2" style="width:18px; height:18px;"></i> Subjects
                                </h6>
                            </div>
                            <div class="list-group list-group-flush subject-list custom-scrollbar" style="max-height: 70vh; overflow-y: auto;">
                                <button th:each="subject : ${subjects}" 
                                        th:text="${subject}"
                                        class="list-group-item list-group-item-action border-0 px-4 py-3 d-flex align-items-center justify-content-between subject-btn"
                                        th:data-subject="${subject}">
                                    <span class="fw-medium" th:text="${subject}">Subject</span>
                                    <i data-lucide="chevron-right" class="small opacity-50" style="width:16px; height:16px;"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Topics & Questions (Right) -->
                    <div class="col-lg-9">
                        <!-- Topics Sub-list -->
                        <div id="topicsContainer" class="mb-4 d-none">
                            <div class="card glass-card border-0 shadow-sm overflow-hidden">
                                <div class="card-header bg-success bg-opacity-10 border-0 p-3">
                                    <h6 class="mb-0 fw-bold text-success d-flex align-items-center">
                                        <i data-lucide="layers" class="me-2" style="width:18px; height:18px;"></i> Topics
                                    </h6>
                                </div>
                                <div class="card-body p-2">
                                    <div id="topicsList" class="d-flex flex-wrap gap-2">
                                        <!-- Dynamic topics will appear here -->
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Questions Area -->
                        <div id="questionsContainer" class="d-none">
                            <div class="card glass-card border-0 shadow-sm">
                                <div class="card-header bg-light border-0 p-3 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                                    <div>
                                        <h5 id="selectedTopicTitle" class="mb-0 fw-bold text-primary">Topic Name</h5>
                                        <small class="text-muted">Browse questions by difficulty</small>
                                    </div>
                                    
                                    <div class="d-flex gap-2 align-items-center">
                                        <!-- Copy All Button -->
                                        <button id="copyAllBtn" class="btn btn-outline-primary shadow-sm border-0 bg-white" title="Copy all questions">
                                            <i data-lucide="copy-check" class="small me-1" style="width:16px; height:16px;"></i> Copy All
                                        </button>

                                        <!-- Level Filter -->
                                        <select id="levelFilter" class="form-select shadow-sm border-0 bg-white" style="width: auto; min-width: 150px;">
                                            <option value="Basics">🟢 Basics</option>
                                            <option value="Intermediate">🟡 Intermediate</option>
                                            <option value="Advanced">🔴 Advanced</option>
                                        </select>
                                        
                                        <!-- Search -->
                                        <div class="input-group shadow-sm">
                                            <span class="input-group-text border-0 bg-white"><i data-lucide="search" class="small" style="width:16px; height:16px;"></i></span>
                                            <input type="text" id="questionSearch" class="form-control border-0" placeholder="Search questions...">
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="card-body p-4">
                                    <div id="questionsList" class="row g-3">
                                        <!-- Dynamic questions will appear here -->
                                    </div>
                                    
                                    <!-- Empty State -->
                                    <div id="emptyState" class="text-center py-5 d-none">
                                        <div class="mb-3">
                                            <i data-lucide="search-x" class="text-muted" style="width: 48px; height: 48px;"></i>
                                        </div>
                                        <h5 class="text-muted">No questions found</h5>
                                        <p class="small text-muted">Try changing the difficulty level or search term</p>
                                    </div>

                                    <!-- Loading State -->
                                    <div id="loadingState" class="text-center py-5 d-none">
                                        <div class="spinner-border text-primary mb-3" role="status"></div>
                                        <h5 class="text-muted">Fetching questions...</h5>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Initial Welcome State -->
                        <div id="welcomeState" class="text-center py-5">
                            <div class="mb-4">
                                <i data-lucide="graduation-cap" class="text-primary opacity-25" style="width: 100px; height: 100px;"></i>
                            </div>
                            <h3 class="fw-bold text-primary">Daily Task Portal</h3>
                            <p class="text-muted mx-auto" style="max-width: 500px;">Select a subject from the left panel to begin exploring topics and interview questions.</p>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="copyToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    <i data-lucide="check-circle" class="me-2" style="width:18px; height:18px;"></i> Question copied to clipboard!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Scripts Fragment -->
    <th:block th:replace="~{fragments/scripts :: scripts_fragment}"></th:block>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            let currentSubject = '';
            let currentTopic = '';
            let allQuestions = [];

            // 1. Subject Selection
            $('.subject-btn').click(function() {
                const subject = $(this).data('subject');
                currentSubject = subject;
                
                // UI Updates
                $('.subject-btn').removeClass('active bg-primary text-white');
                $(this).addClass('active bg-primary text-white');
                $(this).find('i').removeClass('opacity-50').addClass('opacity-100');
                
                $('#welcomeState').addClass('d-none');
                $('#topicsContainer').removeClass('d-none');
                $('#questionsContainer').addClass('d-none');
                
                fetchTopics(subject);
            });

            // 2. Fetch Topics (Tabs)
            function fetchTopics(subject) {
                $('#topicsList').html('<div class="spinner-border spinner-border-sm text-success m-3" role="status"></div>');
                
                $.get('/api/tasks/topics', { subject: subject }, function(topics) {
                    if (topics && topics.length > 0) {
                        let html = '';
                        topics.forEach(topic => {
                            html += `<button class="btn btn-outline-success btn-sm topic-chip px-3 py-2 rounded-pill fw-medium" data-topic="${topic}">${topic}</button>`;
                        });
                        $('#topicsList').html(html);
                        
                        // Attach click event to chips
                        $('.topic-chip').click(function() {
                            const topic = $(this).data('topic');
                            currentTopic = topic;
                            
                            $('.topic-chip').removeClass('btn-success text-white').addClass('btn-outline-success');
                            $(this).removeClass('btn-outline-success').addClass('btn-success text-white');
                            
                            $('#selectedTopicTitle').text(topic);
                            $('#questionsContainer').removeClass('d-none');
                            
                            fetchQuestions();
                        });
                    } else {
                        $('#topicsList').html('<p class="text-danger p-3 mb-0 small">No topics found for this subject. Ensure the Spreadsheet ID is correct.</p>');
                    }
                });
            }

            // 3. Fetch Questions
            function fetchQuestions() {
                const level = $('#levelFilter').val();
                
                $('#questionsList').addClass('d-none');
                $('#loadingState').removeClass('d-none');
                $('#emptyState').addClass('d-none');
                
                $.get('/api/tasks/questions', { 
                    subject: currentSubject, 
                    topic: currentTopic, 
                    level: level 
                }, function(questions) {
                    allQuestions = questions;
                    renderQuestions(questions);
                }).always(function() {
                    $('#loadingState').addClass('d-none');
                });
            }

            // 4. Render Questions
            function renderQuestions(questions) {
                if (!questions || questions.length === 0) {
                    $('#questionsList').html('').addClass('d-none');
                    $('#emptyState').removeClass('d-none');
                    return;
                }

                $('#emptyState').addClass('d-none');
                $('#questionsList').removeClass('d-none').html('');
                
                questions.forEach((q, index) => {
                    const html = `
                        <div class="col-12 question-card-wrapper animate-in" style="animation-delay: ${index * 0.05}s">
                            <div class="card border-0 shadow-sm h-100 hover-lift bg-light bg-opacity-50">
                                <div class="card-body p-3 d-flex align-items-start justify-content-between gap-3">
                                    <div class="d-flex gap-3 align-items-start">
                                        <span class="badge bg-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 28px; height: 28px; min-width: 28px;">${index + 1}</span>
                                        <p class="mb-0 fw-medium question-text">${q}</p>
                                    </div>
                                    <button class="btn btn-sm btn-outline-primary copy-btn border-0 p-2" data-text="${q.replace(/"/g, '&quot;')}" title="Copy to clipboard">
                                        <i data-lucide="copy" style="width: 18px; height: 18px;"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    $('#questionsList').append(html);
                });

                // Initialize icons for newly added elements
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }

                // Attach Copy Logic
                $('.copy-btn').click(function() {
                    const text = $(this).data('text');
                    navigator.clipboard.writeText(text).then(() => {
                        const toast = new bootstrap.Toast(document.getElementById('copyToast'));
                        toast.show();
                        
                        // Success animation on button
                        const btn = $(this);
                        const originalIcon = btn.html();
                        btn.html('<i data-lucide="check" class="text-success" style="width: 18px; height: 18px;"></i>');
                        if (typeof lucide !== 'undefined') lucide.createIcons();
                        setTimeout(() => {
                            btn.html(originalIcon);
                            if (typeof lucide !== 'undefined') lucide.createIcons();
                        }, 2000);
                    });
                });
            }

            // 5. Level Filter Change
            $('#levelFilter').change(function() {
                if (currentSubject && currentTopic) {
                    fetchQuestions();
                }
            });

            // 6. Search Logic
            $('#questionSearch').on('keyup', function() {
                const term = $(this).val().toLowerCase();
                const filtered = allQuestions.filter(q => q.toLowerCase().includes(term));
                renderQuestions(filtered);
            });

            // 7. Copy All Logic
            $('#copyAllBtn').click(function() {
                const questions = [];
                $('#questionsList .question-text').each(function() {
                    questions.push($(this).text().trim());
                });

                if (questions.length === 0) return;

                const textToCopy = questions.join('\n');
                navigator.clipboard.writeText(textToCopy).then(() => {
                    const toast = new bootstrap.Toast(document.getElementById('copyToast'));
                    // Update toast message for "All"
                    const originalToastBody = $('#copyToast .toast-body').html();
                    $('#copyToast .toast-body').html('<i data-lucide="check-circle" class="me-2" style="width:18px; height:18px;"></i> All questions copied to clipboard!');
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                    
                    toast.show();
                    
                    // Reset toast body after delay
                    setTimeout(() => {
                        $('#copyToast .toast-body').html(originalToastBody);
                        if (typeof lucide !== 'undefined') lucide.createIcons();
                    }, 3000);

                    // Success animation on button
                    const btn = $(this);
                    const originalContent = btn.html();
                    btn.html('<i data-lucide="check" class="text-success me-1" style="width: 16px; height: 16px;"></i> Copied!');
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                    setTimeout(() => {
                        btn.html(originalContent);
                        if (typeof lucide !== 'undefined') lucide.createIcons();
                    }, 2000);
                });
            });
        });
    </script>

    <style>
        .subject-btn.active {
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2);
            z-index: 1;
        }
        
        .topic-chip {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .topic-chip:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(25, 135, 84, 0.15);
        }
        
        .hover-lift {
            transition: all 0.2s ease;
            border: 1px solid transparent !important;
        }
        
        .hover-lift:hover {
            transform: translateX(5px);
            border-color: var(--primary-bg) !important;
            background: white !important;
        }
        
        .question-text {
            line-height: 1.6;
            color: var(--text-main);
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        
        .animate-in {
            animation: slideIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        
        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        [data-theme="dark"] .subject-btn:hover {
            background: rgba(255,255,255,0.05);
        }
        
        [data-theme="dark"] .bg-light {
            background-color: rgba(30, 41, 59, 0.5) !important;
        }
    </style>
</body>
</html>
