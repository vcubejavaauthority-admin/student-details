<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Students – Google Sheet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
	rel="stylesheet">
        <link href="../styles.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand fw-bold" th:href="@{/}"> <i
				class="fas fa-arrow-left me-2"></i>Back to Dashboard
			</a>
		</div>
	</nav>
<div class="container mt-4">

 <!-- loading layer -->
    <div id="loader" class="loading-overlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
    <div class="card shadow">
        <div class="card-header bg-warning text-white">
            <h4 class="mb-0">Students – Google Sheet</h4>
        </div>
        <div class="card-body">

            <!-- Search + Batch + Date filter form (server-side) -->
            <form class="row g-3 mb-3" th:action="@{/filter-students}" method="get" onsubmit="showLoading()">
                <!-- Batch dropdown -->
                <div class="col-md-3">
                    <label class="form-label fw-bold">Batch</label>
                    <select class="form-select" name="batch">
                        <option value="">All</option>
                        <option th:each="b : ${batches}"
                                th:value="${b}"
                                th:text="${b}"
                                th:selected="${b == selectedBatch}">
                        </option>
                    </select>
                </div>

                <!-- Date filter -->
                <div class="col-md-3">
                    <label class="form-label fw-bold">Date</label>
                    <input type="date"
                           class="form-control"
                           name="date"
                           th:value="${selectedDate}">
                </div>

                <!-- Keyword search -->
                <div class="col-md-4">
                    <label class="form-label fw-bold">Search</label>
                    <input type="text"
                           class="form-control"
                           name="keyword"
                           th:value="${keyword}"
                           placeholder="Search by roll, name, email, mobile">
                </div>

                <!-- Column filter for client-side JS -->
                <div class="col-md-2">
                    <label class="form-label fw-bold">Filter column</label>
                    <select id="columnFilter" class="form-select">
                        <option value="">All</option>
                        <option value="0">Roll No</option>
                        <option value="1">Name</option>
                        <option value="2">Mobile</option>
                        <option value="3">Email</option>
                        <option value="4">Attendance</option>
                    </select>
                </div>

                <div class="col-12 d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary">Search</button>
                </div>
            </form>

            <!-- Client-side quick filter -->
            <div class="mb-3">
                <input id="tableFilterInput"
                       type="text"
                       class="form-control"
                       placeholder="Type to filter current table (no server call)">
            </div>

            <!-- Students table -->
            <div class="table-responsive">
                <table id="studentsTable" class="table table-striped table-bordered table-sm align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>Roll No</th>
                        <th>Name</th>
                        <th>Mobile</th>
                        <th>Email</th>
                        <th>Attendance</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${students}">
                        <td th:text="${s.rollNo}"></td>
                        <td th:text="${s.name}"></td>
                        <td th:text="${s.mobile}"></td>
                        <td th:text="${s.email}"></td>
                        <td th:text="${s.mark}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script>
    const input = document.getElementById('tableFilterInput');
    const table = document.getElementById('studentsTable');
    const colSelect = document.getElementById('columnFilter');

    input.addEventListener('keyup', function () {
        const filter = input.value.toLowerCase();
        const colIndex = colSelect.value === '' ? null : parseInt(colSelect.value);

        const rows = table.getElementsByTagName('tr');
        for (let i = 1; i < rows.length; i++) { // skip header
            const cells = rows[i].getElementsByTagName('td');
            let text = '';

            if (colIndex === null) {
                for (let c = 0; c < cells.length; c++) {
                    text += cells[c].textContent.toLowerCase() + ' ';
                }
            } else if (cells[colIndex]) {
                text = cells[colIndex].textContent.toLowerCase();
            }

            rows[i].style.display = text.indexOf(filter) > -1 ? '' : 'none';
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../appScript.js"></script>
</body>
</html>
