<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: head_fragment('Live Attendance Sheet - Vcube Admin')}"></th:block>
</head>
<body class="bg-body">
    <!-- loading layer -->
    <style>
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--glass-bg); backdrop-filter: blur(5px); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .loading-overlay.show { display: flex !important; }
    </style>
    <div id="loader" class="loading-overlay">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div class="wrapper">
        <!-- Sidebar -->
        <th:block th:replace="~{fragments/sidebar :: sidebar_fragment}"></th:block>
        
        <!-- Main Content Area -->
        <div id="content">
            <!-- Header -->
            <th:block th:replace="~{fragments/header :: header_fragment('Live Attendance Sheet')}"></th:block>

            <div class="container-fluid p-4 page-enter">
                <div class="row pt-2 pl-2 mb-3">
                    <div class="col-12">
                         <a th:href="@{/dashboard}" class="btn btn-outline-secondary rounded-pill fw-medium btn-sm">
                            <i class="lucide-arrow-left me-2"></i>Back to Dashboard
                        </a>
                    </div>
                </div>

                <div class="card glass-card border-0 shadow-sm mb-4">
                    <div class="card-header border-0 py-4 d-flex align-items-center" style="background: linear-gradient(135deg, rgba(13, 110, 253, 0.1), rgba(102, 16, 242, 0.05));">
                        <div class="p-2 bg-primary bg-opacity-10 rounded-circle me-3">
                            <i class="lucide-users text-primary fa-2x d-block" style="line-height:1;"></i>
                        </div>
                        <div>
                            <h4 class="mb-0 fw-bold text-primary">Student Filter & Live Entry</h4>
                            <p class="mb-0 text-muted small">Search students or apply bulk rolls to auto-mark</p>
                        </div>
                    </div>
                    
                    <div class="card-body p-4">
                        <!-- Search + Batch + Rolls filter form (server-side) -->
                        <form class="row g-3 mb-4" th:action="@{/attendance/filter-students}" method="get" onsubmit="showLoading()">
                            
                            <!-- Date Selection -->
                            <div class="col-md-2">
                                <label class="form-label fw-bold small text-muted text-uppercase">Date</label>
                                <input type="date" class="form-control shadow-sm" name="date" 
                                    th:value="${selectedDate}" required id="attendanceDate">
                            </div>

                            <!-- Batch dropdown -->
                            <div class="col-md-2">
                                <label class="form-label fw-bold small text-muted text-uppercase">Batch</label> 
                                <select class="form-select shadow-sm" name="batch">
                                    <option value="">All Batches</option>
                                    <option th:each="b : ${batches}" th:value="${b}" th:text="${b}"
                                        th:selected="${b == selectedBatch}"></option>
                                </select>
                            </div>

                            <!-- Keyword search -->
                            <div class="col-md-3">
                                <label class="form-label fw-bold small text-muted text-uppercase">Search</label> 
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-transparent border-end-0"><i class="lucide-search text-muted" style="width:16px;"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0 text-body bg-transparent" name="keyword"
                                        th:value="${keyword}" placeholder="Name, email...">
                                </div>
                            </div>

                            <!-- Roll numbers quick select (backend) -->
                            <div class="col-md-5">
                                <label class="form-label fw-bold small text-muted text-uppercase">Bulk Rolls (comma separated)</label> 
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-transparent border-end-0"><i class="lucide-hash text-muted" style="width:16px;"></i></span>
                                    <input type="text" id="rollInputBox" class="form-control border-start-0 ps-0 text-body bg-transparent border-end-0"
                                        name="rollInput" th:value="${rollInput}" placeholder="e.g. 10, 23, 44">
                                    <button type="submit" class="btn btn-secondary border border-secondary" name="action" value="applyRolls">
                                        <i class="lucide-check-circle me-1" style="width:16px;"></i>Apply
                                    </button>
                                </div>
                                <div id="liveRollStats" class="mt-2 d-flex flex-wrap gap-2 align-items-center" style="min-height: 24px;">
                                    <!-- Dynamic stats will appear here -->
                                </div>
                            </div>

                            <!-- Action Buttons -->
                            <div class="col-12 d-flex justify-content-end border-top pt-3 mt-4">
                                <button type="submit" class="btn btn-primary px-4 fw-bold shadow-sm rounded-pill" name="action" value="search">
                                    <i class="lucide-search me-2"></i>Filter List
                                </button>
                            </div>
                        </form>

                        <!-- Students table + attendance form -->
                        <form th:action="@{/attendance/submit-attendance}" method="post" onsubmit="showLoading()">
                            
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="fw-bold text-muted mb-0">Filtered Results <span class="badge bg-secondary ms-2" th:text="${#lists.size(students)}">0</span></h6>
                            </div>

                            <div class="table-responsive bg-transparent border rounded-3 shadow-sm mb-4">
                                <table id="studentsTable" class="table table-hover align-middle mb-0">
                                    <thead class="table-light text-muted" style="border-bottom: 2px solid var(--border-color);">
                                        <tr>
                                            <th class="ps-3 py-3" style="width:50px;">S/No</th>
                                            <th class="py-3">Roll No</th>
                                            <th class="py-3">Name</th>
                                            <th class="py-3">Contact info</th>
                                            <th class="py-3 text-center" style="width:120px;">Presence</th>
                                        </tr>
                                    </thead>
                                    <tbody class="border-top-0">
                                        <tr th:each="s, stat : ${students}">
                                            <td class="ps-3 text-muted fw-bold" th:text="${stat.index + 1}"></td>
                                            <td>
                                                <span class="badge bg-primary bg-opacity-10 text-primary border border-primary fw-bold px-2 py-1">
                                                    <i class="lucide-hash me-1" style="width:10px;"></i><span th:text="${s.rollNo}"></span>
                                                </span>
                                            </td>
                                            <td class="fw-medium text-body" th:text="${s.name}"></td>
                                            <td>
                                                <div class="d-flex flex-column text-muted small">
                                                    <span><i class="lucide-phone me-1" style="width:10px;"></i> <span th:text="${s.mobile}"></span></span>
                                                    <span><i class="lucide-mail me-1" style="width:10px;"></i> <span th:text="${s.email}" class="font-monospace"></span></span>
                                                </div>
                                            </td>
                                            <td class="text-center">
                                                <div class="form-check form-switch d-flex justify-content-center m-0">
                                                    <input class="form-check-input ms-0 shadow-sm" type="checkbox" role="switch" style="width:2em; height:1em; cursor:pointer;"
                                                        name="presentRolls" th:value="${s.rollNo}" th:checked="${s.online} ? 'checked' : null">
                                                </div>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(students)}">
                                            <td colspan="5" class="text-center py-5 text-muted">
                                                <i class="lucide-users fa-3x mb-3 opacity-50 d-block mx-auto"></i>
                                                <h5>No students match the criteria</h5>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <!-- Hidden filters to keep context -->
                            <input type="hidden" name="batch" th:value="${selectedBatch}">
                            <input type="hidden" name="date" th:value="${selectedDate}">

                            <div class="d-flex justify-content-end" th:if="${not #lists.isEmpty(students)}">
                                <button type="submit" class="btn btn-success px-4 py-2 fw-bold shadow-sm rounded-pill btn-lg w-100 w-md-auto">
                                    <i class="lucide-save me-2"></i>Save Attendance State
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Scripts Fragment -->
    <th:block th:replace="~{fragments/scripts :: scripts_fragment}"></th:block>
    
    <script>
        function showLoading() {
            document.getElementById('loader').classList.add('show');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const dateInput = document.getElementById('attendanceDate');
            const rollInput = document.getElementById('rollInputBox');
            const statsContainer = document.getElementById('liveRollStats');
            
            // Set max date to today
            const today = new Date().toISOString().split('T')[0];
            dateInput.setAttribute('max', today);
            
            // If no date is selected, default to today
            if (!dateInput.value) {
                dateInput.value = today;
            }

            // Get all valid roll numbers currently in the table
            const getTableRolls = () => {
                const rolls = [];
                document.querySelectorAll('#studentsTable tbody tr').forEach(tr => {
                    const rollSpan = tr.querySelector('td:nth-child(2) span span');
                    if (rollSpan) rolls.push(rollSpan.textContent.trim());
                });
                return rolls;
            };

            const updateStats = () => {
                const value = rollInput.value.trim();
                if (!value) {
                    statsContainer.innerHTML = '<span class="text-muted small"><i class="lucide-info me-1" style="width:12px;"></i>Enter roll numbers to see live validation</span>';
                    if(typeof lucide !== 'undefined') lucide.createIcons();
                    return;
                }

                const tableRolls = getTableRolls();
                const inputRolls = value.split(',').map(r => r.trim()).filter(r => r !== '');
                const uniqueInputRolls = [...new Set(inputRolls)];
                
                const validRolls = uniqueInputRolls.filter(r => tableRolls.includes(r));
                const invalidRolls = uniqueInputRolls.filter(r => !tableRolls.includes(r));

                let html = `
                    <span class="badge bg-success bg-opacity-10 text-success border border-success-subtle">
                        <i class="lucide-check me-1" style="width:12px;"></i>Found: ${validRolls.length}
                    </span>
                `;

                if (invalidRolls.length > 0) {
                    html += `
                        <span class="badge bg-danger bg-opacity-10 text-danger border border-danger-subtle">
                            <i class="lucide-alert-circle me-1" style="width:12px;"></i>Invalid: ${invalidRolls.length}
                        </span>
                        <div class="w-100 mt-1">
                            <small class="text-danger fw-bold">Not in list or batch: </small>
                            <small class="text-danger">${invalidRolls.join(', ')}</small>
                        </div>
                    `;
                }

                statsContainer.innerHTML = html;
                if(typeof lucide !== 'undefined') lucide.createIcons();
            };

            rollInput.addEventListener('input', updateStats);
            updateStats(); // Run initially if there's existing value
        });
    </script>
</body>
</html>
