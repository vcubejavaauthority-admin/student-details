<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Online Emails Update</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
	<link
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
	rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand fw-bold" th:href="@{/}"> <i
				class="fas fa-arrow-left me-2"></i>Back to Dashboard
			</a>
		</div>
	</nav>
	<div class="container mt-5">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow">
					<div class="card-header bg-warning text-white text-center">
						<h4>Online Sheet – Email Date Update</h4>
					</div>
					<div class="card-body">

						<!-- message -->
						<div th:if="${message != null}"
							class="alert alert-dismissible fade show"
							th:classappend="${success} ? ' alert-success' : ' alert-danger'">
							<span th:text="${message}"></span>
							<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
						</div>

						<form th:action="@{/online/update-email}" method="post">
							<!-- Batch -->
							<div class="mb-3">
								<label class="form-label fw-bold">Batch</label> <select
							class="form-select" name="batchNo">
							<option value="" selected disabled>Select batch</option>
									<option th:each="batch : ${batches}" th:value="${batch}"
										th:text="${batch}"></option>
						</select>
								<div class="form-text">Choose Batch...</div>
							</div>

							<!-- Email -->
							<div class="mb-3">
								<label class="form-label fw-bold">Email</label> <input
									type="email" class="form-control" name="email"
									placeholder="student@example.com" required>
							</div>

							<!-- Date -->
							<div class="mb-3">
								<label class="form-label fw-bold">Date</label> <input
									type="date" class="form-control" name="date" required>
							</div>

							<div class="d-grid">
								<button type="submit" class="btn btn-primary">✅ Save /
									Update</button>
							</div>
						</form>


					</div>
				</div>
			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
