<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head_fragment('Weekly Mock Report - Vcube Admin')}">
    <!-- Required to use standard layout, replace standard head content -->
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar Fragment -->
        <th:block th:replace="~{fragments/sidebar :: sidebar_fragment}"></th:block>
        
        <!-- Main Content Area -->
        <div id="content">
            <!-- Header Fragment -->
            <th:block th:replace="~{fragments/header :: header_fragment('Weekly Mock Report')}"></th:block>
            
            <!-- Page Content -->
            <div class="container-fluid p-4 page-enter">
                
                <!-- Filter Panel -->
                <div class="card glass-card border-0 mb-4 shadow-sm">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4 d-flex align-items-center">
                            <i class="lucide-calendar me-2 text-primary"></i> Select Report Date
                        </h5>
                        
                        <form action="/weekly-mock-report" method="post" id="reportForm">
                            <div class="row g-3 align-items-end">
                                <!-- Year Selector -->
                                <div class="col-md-4 col-sm-6">
                                    <label for="yearSelect" class="form-label small fw-bold text-muted">Select Year</label>
                                    <select class="form-select shadow-sm" id="yearSelect" name="year" required>
                                        <option value="" disabled selected>Select year...</option>
                                        <option th:each="entry : ${years}" 
                                                th:value="${entry.key}" 
                                                th:data-sheet-id="${entry.value}"
                                                th:text="${entry.key}"
                                                th:selected="${entry.key == selectedYear}"></option>
                                    </select>
                                    <!-- Hidden input to store spreadsheetId so it gets submitted -->
                                    <input type="hidden" name="spreadsheetId" id="spreadsheetIdInput" th:value="${selectedSpreadsheetId}" />
                                </div>

                                <!-- Spreadsheet / Sheet Name Selector -->
                                <div class="col-md-5 col-sm-6">
                                    <label for="sheetSelect" class="form-label small fw-bold text-muted">Spread sheets (Report Date)</label>
                                    <select class="form-select shadow-sm" id="sheetSelect" name="sheetName" required disabled>
                                        <option value="" disabled selected>Select spread sheet...</option>
                                        <!-- Will be populated via AJAX -->
                                    </select>
                                </div>

                                <!-- Generate Button -->
                                <div class="col-md-3 col-sm-12">
                                    <button type="submit" class="btn btn-primary fw-bold w-100 shadow-sm" id="generateReportBtn" disabled>
                                        <i class="lucide-bar-chart-2 me-2" style="width:18px;"></i> Generate Report
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Loading State (for AJAX dropdown fetching) -->
                <div id="dropdownLoading" class="d-none mb-3">
                    <div class="d-flex align-items-center text-primary">
                        <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                        <span class="small fw-bold">Fetching available sheets...</span>
                    </div>
                </div>

                <!-- Empty State -->
                <div th:if="${records == null}" id="emptyState" class="text-center py-5">
                    <div style="font-size: 4rem; opacity: 0.3; margin-bottom: 1rem;">📊</div>
                    <h5 class="text-muted fw-bold">Select Year and Report Date</h5>
                    <p class="text-muted small">Choose the year and the specific weekly sheet to view the mock report.</p>
                </div>

                <!-- Report Content -->
                <div th:if="${records != null}" id="reportContent" class="fade-in-up">
                    
                    <!-- Summary Card -->
                    <div class="row g-4 mb-4">
                        <div class="col-lg-4 col-md-6">
                            <div class="card glass-card h-100 border-0 summary-card-1">
                                <div class="card-body p-4">
                                    <div class="d-flex align-items-center mb-2">
                                        <div class="p-2 rounded-3 me-3 bg-info bg-opacity-10 text-info">
                                            <i class="lucide-users"></i>
                                        </div>
                                        <span class="small fw-bold text-muted text-uppercase">Total Records</span>
                                    </div>
                                    <h2 class="fw-bold mb-0" th:text="${records.size()}">0</h2>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Data Table -->
                    <div class="card glass-card border-0 mb-4 shadow-sm">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="fw-bold mb-0 d-flex align-items-center">
                                    <i class="lucide-table me-2 text-secondary"></i> 
                                    Report Details: <span class="ms-2 text-primary" th:text="${selectedSheetName}"></span>
                                </h6>
                                <span class="badge bg-primary" th:text="${records.size()} + ' students'">0 students</span>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th>S/No</th>
                                            <th>Batch & Rollno</th>
                                            <th>Name</th>
                                            <th>Marks</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:if="${records.empty}">
                                            <td colspan="4" class="text-center text-muted py-4">No data found in the selected sheet.</td>
                                        </tr>
                                        <tr th:each="record : ${records}">
                                            <td class="fw-bold text-secondary" th:text="${record.serialNo}"></td>
                                            <td>
                                                <span class="badge bg-light text-dark border border-secondary border-opacity-25 shadow-sm" 
                                                      th:text="${record.batchAndRollNo}">
                                                </span>
                                            </td>
                                            <td class="fw-bold text-dark" th:text="${record.name}"></td>
                                            <td>
                                                <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25" 
                                                      th:text="${record.marks}" th:if="${record.marks != null and !record.marks.empty}">
                                                </span>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Scripts Fragment -->
    <th:block th:replace="~{fragments/scripts :: scripts_fragment}"></th:block>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Page Script -->
    <script th:inline="javascript">
    $(document).ready(function() {
        const yearSelect = $('#yearSelect');
        const sheetSelect = $('#sheetSelect');
        const spreadsheetIdInput = $('#spreadsheetIdInput');
        const generateBtn = $('#generateReportBtn');
        const dropdownLoading = $('#dropdownLoading');

        // Pre-selected values from backend after submit
        const selectedYear = /*[[${selectedYear}]]*/ null;
        const selectedSheetName = /*[[${selectedSheetName}]]*/ null;

        function loadSheetsForYear(spreadsheetId, preselectSheetName) {
            sheetSelect.empty();
            sheetSelect.append('<option value="" disabled selected>Select spread sheet...</option>');
            sheetSelect.prop('disabled', true);
            generateBtn.prop('disabled', true);
            dropdownLoading.removeClass('d-none');

            $.ajax({
                url: '/api/weekly-mock/sheets',
                type: 'GET',
                data: { spreadsheetId: spreadsheetId },
                success: function(data) {
                    dropdownLoading.addClass('d-none');
                    sheetSelect.prop('disabled', false);
                    
                    if (data && data.length > 0) {
                        data.forEach(function(sheetName) {
                            // Optionally filter out specific sheets if they are configuration/master tabs
                            if(sheetName !== 'Mock-List' && sheetName !== 'Sheet1') {
                                const selectedStr = (sheetName === preselectSheetName) ? 'selected' : '';
                                sheetSelect.append(`<option value="${sheetName}" ${selectedStr}>${sheetName}</option>`);
                            }
                        });
                        
                        // Enable generate button if a valid sheet is pre-selected
                        if (sheetSelect.val()) {
                            generateBtn.prop('disabled', false);
                        }
                    } else {
                        sheetSelect.append('<option value="" disabled>No sheets found</option>');
                    }
                },
                error: function() {
                    dropdownLoading.addClass('d-none');
                    alert('Error fetching sheets. Please check the spreadsheet ID or permissions.');
                }
            });
        }

        // On Year Change
        yearSelect.change(function() {
            const selectedOption = $(this).find('option:selected');
            const sheetId = selectedOption.data('sheet-id');
            spreadsheetIdInput.val(sheetId);
            
            if (sheetId) {
                loadSheetsForYear(sheetId, null);
            } else {
                sheetSelect.empty().append('<option value="" disabled selected>Select spread sheet...</option>').prop('disabled', true);
                generateBtn.prop('disabled', true);
            }
        });

        // On Sheet Change
        sheetSelect.change(function() {
            if ($(this).val()) {
                generateBtn.prop('disabled', false);
            } else {
                generateBtn.prop('disabled', true);
            }
        });

        // If there was a pre-selected year (on POST back)
        if (selectedYear) {
            const selectedOption = yearSelect.find('option:selected');
            const sheetId = selectedOption.data('sheet-id');
            if (sheetId) {
                loadSheetsForYear(sheetId, selectedSheetName);
            }
        }
        
        // Add form submission loading state
        $('#reportForm').submit(function() {
            generateBtn.html('<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Loading...');
            generateBtn.prop('disabled', true);
        });
    });
    </script>
</body>
</html>
