<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head_fragment('User Management - Vcube Admin')}">
</head>
<body>
    <div class="wrapper">
        <th:block th:replace="~{fragments/sidebar :: sidebar_fragment}"></th:block>

        <div id="content">
            <th:block th:replace="~{fragments/header :: header_fragment('User Management')}"></th:block>

            <div class="container-fluid p-4 page-enter">
                <div class="row justify-content-center">
                    <div class="col-lg-10">

                        <!-- Header Card -->
                        <div class="card glass-card border-0 mb-4">
                            <div class="card-body p-4 d-flex flex-column flex-md-row justify-content-between align-items-md-center">
                                <div>
                                    <h3 class="mb-1 fw-bold text-primary"><i class="lucide-users me-2"></i>Admin Users</h3>
                                    <p class="text-muted mb-0">Manage portal users. Only admins can create or remove accounts.</p>
                                </div>
                                <button class="btn btn-primary mt-3 mt-md-0 fw-bold" data-bs-toggle="modal" data-bs-target="#createUserModal" id="btnCreateUser">
                                    <i class="lucide-user-plus me-2" style="width:16px;"></i>Create User
                                </button>
                            </div>
                        </div>

                        <!-- Users Table -->
                        <div class="card glass-card border-0">
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover mb-0 align-middle">
                                        <thead>
                                            <tr style="background: var(--bg-body);">
                                                <th class="px-4 py-3 fw-bold text-muted">#</th>
                                                <th class="px-4 py-3 fw-bold text-muted">Username</th>
                                                <th class="px-4 py-3 fw-bold text-muted">Display Name</th>
                                                <th class="px-4 py-3 fw-bold text-muted">Role</th>
                                                <th class="px-4 py-3 fw-bold text-muted text-end">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody id="usersTableBody">
                                            <tr th:each="user, idx : ${users}">
                                                <td class="px-4 py-3" th:text="${idx.index + 1}">1</td>
                                                <td class="px-4 py-3 fw-medium" th:text="${user.username}">admin</td>
                                                <td class="px-4 py-3" th:text="${user.displayName}">Admin User</td>
                                                <td class="px-4 py-3">
                                                    <span class="badge" th:classappend="${user.role == 'admin'} ? 'bg-primary' : 'bg-secondary'" th:text="${user.role}">admin</span>
                                                </td>
                                                <td class="px-4 py-3 text-end">
                                                    <button th:if="${user.role != 'admin'}" class="btn btn-sm btn-outline-danger" th:attr="onclick='deleteUser(\'' + ${user.username} + '\')'">
                                                        Delete
                                                    </button>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create User Modal -->
    <div class="modal fade" id="createUserModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 1rem;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold"><i class="lucide-user-plus me-2 text-primary"></i>Create New User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" style="filter: invert(0.5);"></button>
                </div>
                <div class="modal-body pt-3">
                    <form id="createUserForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Username</label>
                            <input type="text" class="form-control" id="newUsername" name="username" required placeholder="Enter username">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Password</label>
                            <input type="password" class="form-control" id="newPassword" name="password" required placeholder="Enter password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Display Name</label>
                            <input type="text" class="form-control" id="newDisplayName" name="displayName" required placeholder="Full name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Role</label>
                            <select class="form-select" id="newRole" name="role">
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                    </form>
                    <div id="createResult" class="mt-2" style="display:none;"></div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary fw-bold" id="submitCreateUser" onclick="createUser()">
                        <i class="lucide-check me-1" style="width:16px;"></i>Create
                    </button>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="~{fragments/scripts :: scripts_fragment}"></th:block>

    <script>
        function createUser() {
            const btn = document.getElementById('submitCreateUser');
            const resultDiv = document.getElementById('createResult');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Creating...';

            const formData = new URLSearchParams();
            formData.append('username', document.getElementById('newUsername').value);
            formData.append('password', document.getElementById('newPassword').value);
            formData.append('displayName', document.getElementById('newDisplayName').value);
            formData.append('role', document.getElementById('newRole').value);

            fetch('/admin/users/create', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                resultDiv.style.display = 'block';
                if (data.success) {
                    resultDiv.innerHTML = '<div class="alert alert-success py-2 small">' + data.message + '</div>';
                    setTimeout(() => location.reload(), 1000);
                } else {
                    resultDiv.innerHTML = '<div class="alert alert-danger py-2 small">' + data.message + '</div>';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="lucide-check me-1" style="width:16px;"></i>Create';
                }
            })
            .catch(err => {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '<div class="alert alert-danger py-2 small">Network error</div>';
                btn.disabled = false;
                btn.innerHTML = '<i class="lucide-check me-1" style="width:16px;"></i>Create';
            });
        }

        function deleteUser(username) {
            if (!confirm('Delete user "' + username + '"? This cannot be undone.')) return;

            const formData = new URLSearchParams();
            formData.append('username', username);

            fetch('/admin/users/delete', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    location.reload();
                } else {
                    alert(data.message);
                }
            });
        }
    </script>
</body>
</html>
