<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>CaseStudy Marking System</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
	<link
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
	rel="stylesheet">
<link href="../styles.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand fw-bold" th:href="@{/}"> <i
				class="fas fa-arrow-left me-2"></i>Back to Dashboard
			</a>
		</div>
	</nav>
	<div class="container mt-5">
	 <!-- loading layer -->
    <div id="loader" class="loading-overlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
		<div class="row justify-content-center">
			<div class="col-md-8">
				<div class="card shadow">
					<div class="card-header bg-warning text-white text-center">
						<h3>📋 Mark CaseStudy</h3>
					</div>
					<div class="card-body">

						<!-- Success/Error Message -->
						<div th:if="${success != null}"
							class="alert alert-dismissible fade show"
							th:classappend="${success} ? ' alert-success' : ' alert-danger'">
							<strong th:text="${success} ? '✅ Success!' : '❌ Error!'"></strong>
							<span th:text="${message}"></span>
							<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
						</div>

						<!-- Form -->
						<form th:action="@{/caseStudy/submit}" method="post" onsubmit="showLoading()">
							<!-- Batch Selection -->
							<div class="mb-3">
								<label class="form-label fw-bold">Select Batch</label> <select
									class="form-select" name="batch" required>
									<option value="">Choose Batch...</option>
									<option th:each="batch : ${batches}" th:value="${batch}"
										th:text="${batch}"></option>
								</select>
							</div>

							<!-- Date Selection -->
							<div class="mb-3">
								<label class="form-label fw-bold">CaseStudy Date</label> <input
									type="date" class="form-control" name="date">
								<div class="form-text">Leave empty to use today's date
									automatically.</div>
							</div>

							<!-- Roll Numbers Input -->
							<div class="mb-4">
								<label class="form-label fw-bold">Roll Numbers</label>
								<div class="input-group">
									<span class="input-group-text">📝</span>
									<textarea class="form-control" name="rollNoSet"
										placeholder="59,33,12,45 (comma separated)" required></textarea>
								</div>
								<div class="form-text">Enter roll numbers separated by
									commas</div>
							</div>

							<!-- Buttons -->
							<div class="d-flex justify-content-between">
								<button type="button" class="btn btn-outline-secondary"
									onclick="clearForm()">Clear</button>
								<button type="submit" class="btn btn-success">✅ Save
									Exam Marks</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="../appScript.js"></script>
</body>
</html>
